<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<style>
html,body{background:transparent;color:#fff;font-family:Arial;margin:0;display:flex;justify-content:center}
.card{background:transparent;max-width:420px;width:100%;padding:20px}
.top{background:#111827;border:2px solid #4d7cff;box-shadow:0 0 30px rgba(77,124,255,.45);border-radius:20px;padding:20px;text-align:center}
.row{display:flex;align-items:center;justify-content:center;gap:16px}
img{width:120px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,255,255,.25))}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
.count{font-size:64px;color:#ffd54a;font-weight:bold} .label{color:#aaa}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
button{padding:18px;border:none;border-radius:16px;font-size:22px;color:#fff;cursor:pointer;box-shadow:0 0 18px rgba(255,255,255,.08);transition:.2s}button:hover{transform:scale(1.03)}
.neg{background:#5a2230} .pos{background:#124c38} .full{grid-column:1/4}
input{width:45%;padding:14px;background:#222;border:1px solid #555;color:#fff;border-radius:10px}
.actions{display:flex;gap:10px;margin-top:10px} .sub{background:#ff6b8a;flex:1} .add{background:#39d98a;flex:1;color:#111}
.fly{position:fixed;left:50%;top:170px;transform:translateX(-50%);font-size:34px;font-weight:bold;pointer-events:none;animation:fly .8s forwards}@keyframes fly{to{opacity:0;transform:translate(-50%,-60px)}}

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let n = 0;
function render(){
let v=Math.round(n*100)/100;
c.textContent=(v>0?'+':'')+v;
if(v>0){c.style.color='#39d98a';}
else if(v<0){c.style.color='#ff5f6d';}
else{c.style.color='#ffd54a';}

}
function fly(t,c){let d=document.createElement('div');d.className='fly';d.style.color=c;d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),800);}function chg(v){
    if(!isNaN(v)){
        n += v;

        set(ref(db, "dragons"), n);

        fly(
            (v > 0 ? "+" : "") + v,
            v > 0 ? "#39d98a" : "#ff5f6d"
        );
    }
}
window.chg = chg;
onValue(ref(db, "dragons"), (snapshot) => {
  const value = snapshot.val();
  n = value !== null ? Number(value) : 0;
  render();
});
</script></body></html>
